<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguistAI | Premium Machine Translation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-glow"></div>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-globe-americas"></i>
                <h1>Linguist<span>AI</span></h1>
            </div>
            <p class="subtitle">Next-generation Neural Machine Translation</p>
        </header>

        <main class="translation-card">
            <div class="translation-controls">
                <div class="lang-selector">
                    <label for="src-lang">Source</label>
                    <select id="src-lang">
                        <option value="en" selected>English</option>
                        <option value="hi">Hindi</option>
                        <option value="te">Telugu</option>
                        <option value="fr">French</option>
                        <option value="es">Spanish</option>
                        <option value="de">German</option>
                    </select>
                </div>
                <button id="swap-langs" class="icon-btn" title="Swap languages">
                    <i class="fas fa-exchange-alt"></i>
                </button>
                <div class="lang-selector">
                    <label for="tgt-lang">Target</label>
                    <select id="tgt-lang">
                        <option value="hi" selected>Hindi</option>
                        <option value="en">English</option>
                        <option value="te">Telugu</option>
                        <option value="fr">French</option>
                        <option value="es">Spanish</option>
                        <option value="de">German</option>
                    </select>
                </div>
            </div>

            <div class="translation-areas">
                <div class="area source-area">
                    <textarea id="source-text" placeholder="Enter text to translate..."></textarea>
                    <div class="area-footer">
                        <span id="char-count">0 / 5000</span>
                        <button id="clear-text" class="text-btn">Clear</button>
                    </div>
                </div>
                <div class="area target-area">
                    <div id="loading-overlay" class="hidden">
                        <div class="loader"></div>
                        <p>Translating...</p>
                    </div>
                    <textarea id="target-text" placeholder="Translation will appear here..." readonly></textarea>
                    <div class="area-footer">
                        <div class="action-btns">
                            <button id="copy-text" class="icon-btn" title="Copy to clipboard">
                                <i class="far fa-copy"></i>
                            </button>
                            <button id="speak-text" class="icon-btn" title="Listen to translation">
                                <i class="fas fa-volume-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <button id="translate-btn" class="main-btn">
                <span>Translate</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </main>

        <footer>
            <p>&copy; 2026 LinguistAI. Powered by M2M100 Neural Network.</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
